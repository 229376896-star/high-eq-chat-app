<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高情商话术助手 - 职场沟通救星</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 768px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 10px;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .category-card {
            background: white;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .category-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .category-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .category-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .scripts-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .scenario-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .scenario-item:hover {
            background: #e9ecef;
        }
        
        .scenario-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .script-list {
            display: none;
        }
        
        .script-list.show {
            display: block;
        }
        
        .script-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .script-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 10px;
        }
        
        .script-tip {
            font-size: 13px;
            color: #667eea;
            font-style: italic;
            margin-bottom: 10px;
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        
        .copy-btn.copied {
            background: #28a745;
        }
        
        .favorites-section {
            margin-top: 30px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        
        .view-section {
            display: none;
        }
        
        .view-section.active {
            display: block;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 高情商话术助手</h1>
            <p>职场沟通尴尬时刻的救星，快速找到高情商回复</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchView('all')">全部场景</button>
            <button class="tab-btn" onclick="switchView('favorites')">我的收藏</button>
        </div>
        
        <div id="allView" class="view-section active">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索话术，如：拒绝、道歉、汇报..." oninput="searchScripts()">
            </div>
            
            <div class="category-grid" id="categoryGrid"></div>
            
            <div class="scripts-container">
                <h2 class="section-title" id="sectionTitle">全部场景</h2>
                <div id="scriptsList"></div>
            </div>
        </div>
        
        <div id="favoritesView" class="view-section">
            <div class="scripts-container">
                <h2 class="section-title">⭐ 我的收藏</h2>
                <div id="favoritesList"></div>
            </div>
        </div>
    </div>

    <script>

                    },
                    {

                            {
                                text: "老板发朋友圈必须第一时间点赞！手速练过，就是为了这个时刻。",

                            {
                                text: "看到老板发的文章，我反复读了三遍。不是夸张，是真的每遍都有新收获。",

                                text: "群里老板发言后，我不发表情包了，直接收藏当语录。",

                                text: "老板，您上次说的那个观点我跟朋友聊天都在用，他们问我在哪学的，我说跟我老板学的。",

                            }
                        ]
                    }
                ]
            },
            {
                category: "同事协作",
                icon: "🤝",
                scenarios: [
                    {
                        title: "同事甩锅时的回应",
                        scripts: [
                            {
                                text: "这锅咱俩一人一半，我那份我认了。现在先一起把菜炒好，不然都得饿着。",
                                tip: "用做饭比喻，轻松化解"
                            },
                            {
                                text: "兄弟，你这波操作有点像王者荣耀里抢人头还怪辅助不跟。咱们还是看看回放（聊天记录）吧。",
                                tip: "游戏梗，幽默提醒"
                            },
                            {
                                text: "甩锅大会暂停一下。我建议咱们先解决问题，赛后复盘再分 MVP 和背锅侠，如何？",

                            }

                    },
                    {

                            {

                            {

                    },
                    {

                            {

                            },
                            {
                                text: "要不这样，我发个邮件抄送双方老板，把时间线和责任分工写清楚，咱们按流程走，谁也不背锅。",

                            }
                        ]
                    },
                    {
                        title: "同事邀功时的应对",

                            {
                                text: "恭喜 XX 拿到 MVP！我作为助攻王也很开心，毕竟团队赢了才是真的赢。",

                            },
                            {
                                text: "这个项目能成，XX 确实是 C 位输出，我作为辅助也尽力了。下次继续配合！",

                            },
                            {
                                text: "成功就好！我在其中负责的那部分能帮上忙，我也很有成就感。期待下次合作。",
                                tip: "温和强调贡献，不撕破脸"
                            }
                        ]
                    }
                ]
            },
                        {
                category: "会议发言",
                icon: "📢",
                scenarios: [
                    {
                        title: "开会时被点名发言",
                        scripts: [
                            {
                                text: "好，我简单说三点——别紧张，真的是三点，不是领导的'稍微讲两句'。",

                            {
                                text: "刚才听了大家的讨论，我补充一个角度。说得不对的地方，欢迎大家随时打断。",
                                tip: "降低预期，开放姿态"

                            {
                                text: "这个问题我目前了解的信息还不够全面，不敢乱说。会后我调研一下再给大家详细汇报。",
                                tip: "诚实承认，不瞎编"

                    {

                            },
                            {
                                text: "好，我先把你这个问题记在小本本上。等我说完这部分，咱们专门讨论。",

                            {

                            {

                                tip: "暂停对话，避免升级"
                            },
                            {
                                text: "我感受到你很不满。能否具体说说哪里让你不舒服？我想了解清楚。",
                                tip: "引导具体化，降低情绪"

        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let currentCategory = null;

        // 初始化
        function init() {
            renderCategories();
            renderScripts();
            renderFavorites();
        }

        // 渲染分类卡片
        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = `
                <div class="category-card ${!currentCategory ? 'active' : ''}" onclick="selectCategory(null)">
                    <div class="category-icon">📚</div>
                    <div class="category-name">全部</div>
                </div>
            `;
            
            talkScripts.forEach((cat, index) => {
                grid.innerHTML += `
                    <div class="category-card ${currentCategory === cat.category ? 'active' : ''}" onclick="selectCategory('${cat.category}')">
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-name">${cat.category}</div>
                    </div>
                `;
            });
        }

        // 选择分类
        function selectCategory(category) {
            currentCategory = category;
            renderCategories();
            renderScripts();
            
            const title = category || '全部场景';
            document.getElementById('sectionTitle').textContent = title;
        }

        // 渲染话术列表
        function renderScripts(filterText = '') {
            const container = document.getElementById('scriptsList');
            let html = '';
            
            const categories = currentCategory 
                ? talkScripts.filter(c => c.category === currentCategory)
                : talkScripts;
            
            categories.forEach(cat => {
                cat.scenarios.forEach((scenario, sIndex) => {
                    const matchScript = scenario.scripts.some(s => 
                        !filterText || 
                        scenario.title.includes(filterText) ||
                        s.text.includes(filterText) ||
                        s.tip.includes(filterText)
                    );
                    
                    if (!matchScript) return;
                    
                    html += `
                        <div class="scenario-item" onclick="toggleScenario(this)">
                            <div class="scenario-title">${scenario.title}</div>
                            <div class="script-list">
                    `;
                    
                    scenario.scripts.forEach((script, i) => {
                        const isFavorited = favorites.some(f => f.text === script.text);
                        html += `
                            <div class="script-item">
                                <div class="script-text">${script.text}</div>
                                <div class="script-tip">💡 ${script.tip}</div>
                                <button class="copy-btn" onclick="copyText(this, '${escapeHtml(script.text)}')">📋 复制</button>
                                <button class="copy-btn" style="margin-left: 8px; background: ${isFavorited ? '#ffc107' : '#6c757d'};" 
                                    onclick="toggleFavorite(this, '${escapeHtml(scenario.title)}', '${escapeHtml(script.text)}', '${escapeHtml(script.tip)}')">
                                    ${isFavorited ? '⭐ 已收藏' : '☆ 收藏'}
                                </button>
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                });
            });
            
            container.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>没有找到匹配的话术</p></div>';
        }

        // 切换场景展开/收起
        function toggleScenario(element) {
            const list = element.querySelector('.script-list');
            list.classList.toggle('show');
        }

        // 复制文本
        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✅ 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 复制';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // 收藏/取消收藏
        function toggleFavorite(btn, title, text, tip) {
            const index = favorites.findIndex(f => f.text === text);
            
            if (index === -1) {
                favorites.push({ title, text, tip });
                btn.textContent = '⭐ 已收藏';
                btn.style.background = '#ffc107';
            } else {
                favorites.splice(index, 1);
                btn.textContent = '☆ 收藏';
                btn.style.background = '#6c757d';
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderFavorites();
        }

        // 渲染收藏夹
        function renderFavorites() {
            const container = document.getElementById('favoritesList');
            
            if (favorites.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⭐</div><p>还没有收藏任何话术<br>点击"收藏"按钮添加常用话术</p></div>';
                return;
            }
            
            let html = '';
            favorites.forEach(fav => {
                html += `
                    <div class="script-item">
                        <div style="font-size: 13px; color: #667eea; margin-bottom: 8px;">📁 ${fav.title}</div>
                        <div class="script-text">${fav.text}</div>
                        <div class="script-tip">💡 ${fav.tip}</div>
                        <button class="copy-btn" onclick="copyText(this, '${escapeHtml(fav.text)}')">📋 复制</button>
                        <button class="copy-btn" style="margin-left: 8px; background: #dc3545;" 
                            onclick="removeFavorite('${escapeHtml(fav.text)}')">删除</button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 删除收藏
        function removeFavorite(text) {
            favorites = favorites.filter(f => f.text !== text);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderFavorites();
            renderScripts();
        }

        // 搜索功能
        function searchScripts() {
            const text = document.getElementById('searchInput').value.trim();
            renderScripts(text);
        }

        // 切换视图
        function switchView(view) {
            const tabs = document.querySelectorAll('.tab-btn');
            const views = document.querySelectorAll('.view-section');
            
            tabs.forEach(t => t.classList.remove('active'));
            views.forEach(v => v.classList.remove('active'));
            
            if (view === 'all') {
                tabs[0].classList.add('active');
                document.getElementById('allView').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('favoritesView').classList.add('active');
                renderFavorites();
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // 启动应用
        init();
    </script>
